---
- hosts: calculator
  gather_facts: false

  tasks:

    - name: Pull latest docker image
      command: /usr/local/bin/docker pull ssd31/scientific-calculator:latest

    - name: Stop existing container
      command: /usr/local/bin/docker stop calculator
      ignore_errors: yes

    - name: Remove old container
      command: /usr/local/bin/docker rm calculator
      ignore_errors: yes

    - name: Create calculator container
      command: /usr/local/bin/docker create -it --name calculator ssd31/scientific-calculator:latest